name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  AUTH_MICROSERVICE_URL: http://localhost:3001/internal/auth
  DATABASE_URL: postgresql://postgres:Jadirus33@localhost:5432/innogram?schema=public
  REDIS_URL: redis://localhost:6379
  RABBITMQ_URL: amqp://guest:guest@localhost:5672

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Clients
        run: npx turbo db:generate

      - name: Lint Code
        run: npx turbo lint

      - name: Build Projects
        run: npx turbo build

      - name: Run Unit Tests
        run: npx turbo test

  e2e-tests:
    name: E2E & Integration Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Start Infrastructure
        run: docker compose up -d postgres redis rabbitmq minio
      
      - name: Wait for DB
        run: sleep 10

      - name: Generate Prisma & Migrate DB
        run: |
          npx turbo db:generate
          cd apps/core_microservice && npx prisma migrate deploy

      - name: Run Backend Integration Tests
        run: npx turbo test:e2e --filter=core_microservice

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: apps/client_app

      - name: Start Services for Playwright
        run: |
          npm install -g pm2
          pm2 start "npx turbo dev --filter=core_microservice" --name core
          pm2 start "npx turbo dev --filter=auth_microservice" --name auth
          pm2 start "npx turbo dev --filter=notifications_consumer_microservice" --name consumer
          pm2 start "npx turbo dev --filter=client_app" --name client
          echo "Waiting for core and auth services to be healthy..."
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health && curl -fsS http://localhost:3001/health; then
              echo "Core and Auth services are up."
              break
            fi
            echo "Services not ready yet, retrying in 5s... (attempt $i/30)"
            sleep 5
          done

      - name: Run Playwright Tests
        run: npx playwright test
        working-directory: apps/client_app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/client_app/playwright-report/
          retention-days: 5

  docker-push:
    name: Docker Build & Push
    needs: e2e-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core_microservice, auth_microservice, notifications_consumer_microservice, client_app]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innogram-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SCOPE=${{ matrix.service }}