name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  AUTH_MICROSERVICE_URL: http://127.0.0.1:3001/internal/auth
  DATABASE_URL: postgresql://postgres:Jadirus33@127.0.0.1:5432/innogram?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Clients
        run: npx turbo db:generate

      - name: Lint Code
        run: npx turbo lint

      - name: Build Projects
        run: npx turbo build

      - name: Run Unit Tests
        run: npx turbo test

  e2e-tests:
    name: E2E & Integration Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Next.js reads these when `next dev` starts (pm2). The Playwright step env alone is not enough.
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
      # Required for core FilesService bootstrap in CI
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_BUCKET_NAME: innogram-bucket
      AWS_ENDPOINT: http://127.0.0.1:9000
      # Required for auth bootstrap in CI
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Start Infrastructure
        run: |
          # Ensure clean state (especially important when running via `act`)
          docker compose down -v --remove-orphans || true
          docker compose up -d postgres redis rabbitmq minio
      
      - name: Wait for DB
        run: sleep 10

      - name: Generate Prisma & Migrate DB
        run: |
          npx turbo db:generate
          cd apps/core_microservice && npx prisma migrate deploy
          # Auth service uses the same DB objects managed by core migrations in CI.
          # Running auth baseline migration in the same schema causes duplicate type/table errors.

      - name: Run Backend Integration Tests
        run: npx turbo test:e2e --filter=core_microservice -- --runInBand --detectOpenHandles

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: apps/client_app

      - name: Start Services for Playwright
        run: |
          npm install -g pm2
          export PORT=3001
          export DATABASE_URL=postgresql://postgres:Jadirus33@localhost:5432/innogram?schema=public
          export REDIS_URL=redis://localhost:6379
          export RABBITMQ_URL=amqp://guest:guest@localhost:5672
          export AUTH_MICROSERVICE_URL=http://localhost:3001/internal/auth
          pm2 start "npx ts-node -r tsconfig-paths/register src/main.ts" --name core --cwd apps/core_microservice
          pm2 start "npx ts-node src/app.ts" --name auth --cwd apps/auth_microservice
          pm2 start "npx ts-node src/main.ts" --name consumer --cwd apps/notifications_consumer_microservice
          pm2 start "npm run dev" --name client --cwd apps/client_app
          echo "Waiting for core, auth and client services..."
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/health && curl -fsS http://localhost:3001/health && curl -fsS http://localhost:3002/login >/dev/null; then
              echo "Core, Auth and Client services are up."
              break
            fi
            echo "Services not ready yet, retrying in 5s... (attempt $i/60)"
            sleep 5
          done
          if ! (curl -fsS http://localhost:3000/health && curl -fsS http://localhost:3001/health && curl -fsS http://localhost:3002/login >/dev/null); then
            echo "Services failed to become healthy in time."
            pm2 status
            pm2 logs --lines 200 --nostream
            exit 1
          fi
          pm2 status

      - name: Run Playwright Tests
        run: npx playwright test
        working-directory: apps/client_app

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/client_app/playwright-report/
          retention-days: 5

  docker-push:
    name: Docker Build & Push
    needs: e2e-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core_microservice, auth_microservice, notifications_consumer_microservice, client_app]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innogram-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SCOPE=${{ matrix.service }}