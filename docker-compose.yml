services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jadirus33
      POSTGRES_DB: innogram
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - innogram-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innogram"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    container_name: redis_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - innogram-network
  minio:
    image: minio/minio
    container_name: minio_container
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - innogram-network
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - innogram-network
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for MinIO..."
        until /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done

        echo "MinIO is UP!"
        /usr/bin/mc mb myminio/rika-bucket
        /usr/bin/mc anonymous set public myminio/rika-bucket

        echo "Bucket created."
        exit 0
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq-container
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - innogram-network
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - innogram-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-container
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - innogram-network

  assistant-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: assistant_microservice
    container_name: assistant-microservice
    env_file:
      - .env
    environment:
      ASSISTANT_PORT: "3003"
    networks:
      - innogram-network
    restart: unless-stopped

  auth-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: auth_microservice
    container_name: auth-microservice
    env_file:
      - .env
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:Jadirus33@postgres:5432/innogram?schema=auth
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - innogram-network
    restart: unless-stopped

  core-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: core_microservice
    container_name: core-microservice
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:Jadirus33@postgres:5432/innogram?schema=main
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      ASSISTANT_MICROSERVICE_URL: http://assistant-microservice:3003
      AUTH_MICROSERVICE_URL: http://auth-microservice:3001/internal/auth
      ASSISTANT_SERVICE_SECRET: change_me_assistant_shared_secret
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - assistant-microservice
    networks:
      - innogram-network
    restart: unless-stopped

  client-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: client_app
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_WS_URL: http://localhost:3000
    container_name: client-app
    environment:
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3002:3002"
    depends_on:
      - core-microservice
      - auth-microservice
    networks:
      - innogram-network
    restart: unless-stopped

  notifications-consumer-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: notifications_consumer_microservice
    container_name: notifications-consumer-microservice
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:Jadirus33@postgres:5432/innogram?schema=notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - innogram-network
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  innogram-network:
