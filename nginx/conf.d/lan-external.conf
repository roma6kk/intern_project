# Reverse proxy: HTTP on port 80, all interfaces -> local dev services.
#
# Start: npm run nginx:external
# Use with: npm run dev:external  (set DEV_PUBLIC_HOST to your WAN IP or domain)
#
# Router: forward TCP 80 -> this machine's LAN IP.

worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       ../mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  keepalive_timeout  65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 0.0.0.0:80;
    server_name _;

    set $core_upstream http://127.0.0.1:3000;
    set $auth_upstream http://127.0.0.1:3001;
    set $minio_upstream http://127.0.0.1:9000;
    set $client_upstream http://127.0.0.1:3002;

    location /innogram-bucket/ {
      proxy_pass $minio_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass $core_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass $core_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /internal/auth/ {
      proxy_pass $auth_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/callback {
      proxy_pass $client_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|internal|health|metrics)(/|$) {
      proxy_pass $core_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass $client_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
